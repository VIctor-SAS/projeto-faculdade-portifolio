<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Siqueira - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="menu-topo">
            <ul>
                <li><a href="index.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><button id="btn-tema">Trocar Tema</button></li>
            </ul>
        </nav>
    </header>

    <main class="caixa-principal">
        <section>
            <h2>> Mande uma mensagem</h2>
            
            <form id="form-contato">
                <div class="campo">
                    <label>Nome:</label>
                    <input type="text" id="nome">
                </div>
                
                <div class="campo">
                    <label>E-mail:</label>
                    <input type="email" id="email" placeholder="dev@exemplo.com">
                </div>
                
                <div class="campo">
                    <label>Mensagem:</label>
                    <textarea id="mensagem" rows="5"></textarea>
                </div>
                
                <button type="submit" id="btn-enviar">ENVIAR</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
